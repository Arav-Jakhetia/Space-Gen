<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Signup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Unbounded:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/star.css" />
  <link rel="stylesheet" href="styles/signup.css" />
  <link rel="stylesheet" href="styles/input.css" />
  <link rel="stylesheet" href="styles/checkbox.css" />
</head>
<body>
  <div class="starfield" aria-hidden="true"></div>

  <div class="card" aria-label="Sign up form">
    <div class="title">Create Your Account</div>
    <p class="sub">Join Space Gen and start your journey.</p>

    <form id="form">
      <label for="user">Username</label>
      <input id="user" type="text" class="field" minlength="4" required />

      <label for="d1">Date of birth</label>
      <div class="dob" aria-label="Date of birth">
        <span class="part">
          <input id="d1" type="text" inputmode="numeric" maxlength="1" placeholder="D" required />
          <input id="d2" type="text" inputmode="numeric" maxlength="1" placeholder="D" required />
        </span>
        <span class="sep" aria-hidden="true">-</span>
        <span class="part">
          <input id="m1" type="text" inputmode="numeric" maxlength="1" placeholder="M" required />
          <input id="m2" type="text" inputmode="numeric" maxlength="1" placeholder="M" required />
        </span>
        <span class="sep" aria-hidden="true">-</span>
        <span class="part">
          <input id="y1" type="text" inputmode="numeric" maxlength="1" placeholder="Y" required />
          <input id="y2" type="text" inputmode="numeric" maxlength="1" placeholder="Y" required />
          <input id="y3" type="text" inputmode="numeric" maxlength="1" placeholder="Y" required />
          <input id="y4" type="text" inputmode="numeric" maxlength="1" placeholder="Y" required />
        </span>
      </div>

      <label for="email">Email</label>
      <input id="email" type="email" class="field" required />

      <label for="pass">Password</label>
      <input id="pass" type="password" class="field" minlength="8" required />

      <label class="agree check" for="terms">
        <input id="terms" type="checkbox" required />
        <span class="mark"></span>
        <span class="text">Accept all terms and condition</span>
      </label>

      <input id="create" type="button" value="Create Account" disabled />
    </form>

    <div class="switch">
      Already have an account?
      <a href="login.html">Login</a>
    </div>
  </div>

  <script src="scripts/star.js"></script>
  <script src="scripts/signup.js"></script>
</body>
</html>
