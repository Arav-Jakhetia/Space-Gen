<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700;800&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles/star.css" />
  <link rel="stylesheet" href="styles/home.css" />
</head>
<body>
  <div class="grid-layer" aria-hidden="true"></div>
  <div class="starfield" aria-hidden="true"></div>

  <header>
    <a class="brand" href="index.html">
      <span>Space Gen</span>
    </a>

    <nav class="nav-links" aria-label="Primary">
      <a class="ghost" href="login.html">Login</a>
      <a class="cta" href="signup.html">Sign Up</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-copy">
        <h1>Build your mission, then launch it.</h1>
        <p>
          Space Gen is a solar system simulation with merch. Explore the universe,
          follow planetary visuals, and get mission-inspired products.
        </p>
        <div class="hero-actions">
          <a class="cta" href="signup.html">Sign Up</a>
          <a class="ghost" href="login.html">Login</a>
        </div>
      </div>

      <aside class="hero-panel">
        <img src="pic/earth.jpg" alt="Earth" />
      </aside>
    </section>
  </main>
  <div class="wrapper">
    <span class="item" style="--d: 0.1s;">
      <a class="link" href="#" id="share-instagram" aria-label="Instagram">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <rect x="3.2" y="3.2" width="17.6" height="17.6" rx="5" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.8"/>
          <circle cx="17.4" cy="6.6" r="1.1" fill="currentColor"/>
        </svg>
      </a>
    </span>
    <span class="item" style="--d: 0.2s;">
      <a class="link" href="#" id="share-twitter" aria-label="Twitter">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M18.9 2H21.9L15.3 9.5L23 22H16.9L12.1 15.2L6.2 22H3.2L10.3 13.8L3 2H9.2L13.5 8.2L18.9 2ZM17.9 20.2H19.6L8.3 3.7H6.5L17.9 20.2Z" fill="currentColor"/>
        </svg>
      </a>
    </span>
    <span class="item" style="--d: 0.3s;">
      <a class="link" href="#" id="share-facebook" aria-label="Facebook">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M14.6 8.2H16.8V5.3H14.2C11.8 5.3 10.2 6.9 10.2 9.3V11H8V13.9H10.2V18.7H13.2V13.9H16.2L16.7 11H13.2V9.6C13.2 8.8 13.6 8.2 14.6 8.2Z" fill="currentColor"/>
        </svg>
      </a>
    </span>
    <button class="btn" id="share-home" type="button" aria-label="Share">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M15 8L9 12L15 16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="18" cy="6" r="3" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="6" cy="12" r="3" stroke="currentColor" stroke-width="1.8"/>
        <circle cx="18" cy="18" r="3" stroke="currentColor" stroke-width="1.8"/>
      </svg>
    </button>
  </div>

  <script src="scripts/star.js"></script>
  <script src="scripts/home.js"></script>
</body>
</html>
